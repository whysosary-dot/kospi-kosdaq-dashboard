*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
header{padding:12px 16px;border-bottom:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

select.ctrl-el{padding-right:4px}
.tabs,.vtabs{display:flex;gap:3px}
.tab,.vtab{height:32px;font-size:.82rem;border-radius:6px;border:1px solid #cbd5e1;padding:0 12px;cursor:pointer;background:#f1f5f9;color:#64748b;white-space:nowrap;display:inline-flex;align-items:center;transition:.12s;user-select:none}
.tab:hover,.vtab:hover{color:#1e293b;border-color:#94a3b8}

.tab.both-on,.tab.both-on:hover{background:#16a34a;border-color:#16a34a;color:#fff}
.stat{padding:5px 16px;font-size:.78rem;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.wrap{overflow:auto;height:calc(100vh - 147px)}
table{border-collapse:collapse;width:100%;font-size:.79rem}

.pos{color:#16a34a;font-weight:600}.pos.big{color:#d97706;font-weight:700}

.both-badge{font-size:.68rem;color:#16a34a;font-weight:700;margin-left:3px}

  var s = v < 0 ? "-" : "", a = Math.abs(v);
  if(a >= 1e12) return s + (a/1e12).toFixed(1) + "조";
  if(a >= 1e8)  return s + Math.round(a/1e8).toLocaleString() + "억";
  if(a >= 1e6)  return s + Math.round(a/1e6).toLocaleString() + "백만";
  return v.toLocaleString();
}
function fmtP(v){
  if(v == null) return '<span class="na">-</span>';
  var big = Math.abs(v) >= 100;
  var c = (big && v > 0) ? "pos big" : v > 0 ? "pos" : v < 0 ? "neg" : "";
  return '<span class="' + c + '">' + (v > 0 ? "+" : "") + v + "%</span>";
}

// ── 정렬 ──────────────────────────────────────────────────────
function getVal(d, k){
  if(k.indexOf(".") !== -1){
    var parts = k.split(".");
    return d[parts[0]] ? d[parts[0]][parts[1]] : null;
  }
  return d[k];
}
function cmpFn(a, b, k, dir){
  var av = getVal(a,k), bv = getVal(b,k);
  if(av == null && bv == null) return 0;
  if(av == null) return 1; if(bv == null) return -1;
  return (typeof av === "string") ? av.localeCompare(bv) * dir : (av - bv) * dir;
}
function thSort(k){
  if(sortK === k) sortD *= -1; else { sortK = k; sortD = -1; }
  filtered.sort(function(a,b){ return cmpFn(a,b,k,sortD); });
  render();
}
function quickSort(v){
  if(!v) return;
  var idx = v.lastIndexOf(",");
  sortK = v.slice(0,idx); sortD = parseInt(v.slice(idx+1));
  filtered.sort(function(a,b){ return cmpFn(a,b,sortK,sortD); });
  render();
}

// ── 필터 ──────────────────────────────────────────────────────
function setMarket(m){
  market = m;
  var cls = {ALL:"on",KOSPI:"on",KOSDAQ:"on",FAV:"fav-on",BOTH:"both-on"};
  ["ALL","KOSPI","KOSDAQ","FAV","BOTH"].forEach(function(id){
    var el = document.getElementById("tab-" + id);
    if(!el) return;
    el.classList.remove("on","fav-on","both-on");
    if(id === m) el.classList.add(cls[m]);
  });
  applyFilter();
}
function setView(v, el){
  view = v;
  document.querySelectorAll(".vtab").forEach(function(t){ t.classList.remove("on"); });
  el.classList.add("on");
  updateBothCount();
  if(market === "BOTH") applyFilter(); else render();
}
function applyFilter(){
  var q = document.getElementById("search").value.toLowerCase();
  filtered = D.filter(function(d){
    if(market === "FAV" && !favs.has(d.stock_code)) return false;
    if(market === "BOTH" && !isBothPos(d,view)) return false;
    if(market !== "ALL" && market !== "FAV" && market !== "BOTH" && d.market !== market) return false;
    if(q && d.corp_name.toLowerCase().indexOf(q) === -1 && d.stock_code.indexOf(q) === -1) return false;
    return true;
  });
  render();
}

// ── 렌더 ──────────────────────────────────────────────────────
function render(){
  var vl = view === "rev" ? "매출액" : "영업이익";
  var thead = document.getElementById("thead");
  var tbody = document.getElementById("tbody");

  // 헤더
  var thCols = [
    {k:"corp_name",  label:"기업명",   align:"left"},
    {k:"stock_code", label:"종목코드", align:"left"},
    {k:"market",     label:"시장",     align:"left", sep:true}
  ];
  QS.forEach(function(q, i){
    thCols.push({k: view+"."+q, label: q+"<br><small>"+vl+"</small>", sep: i===4});
  });
  thCols.push({k: view+"_qoq", label:"전분기<br>대비", sep:true});
  thCols.push({k: view+"_yoy", label:"전년동기<br>대비"});

  var thHtml = "<tr>";
  thCols.forEach(function(col){
    var cls = [];
    if(col.sep) cls.push("grp-sep");
    if(col.align === "left") cls.push("th-left");
    if(sortK === col.k) cls.push(sortD === -1 ? "desc" : "asc");
    thHtml += '<th class="' + cls.join(" ") + '" data-sort="' + col.k + '">' + col.label + "</th>";
  });
  thHtml += "</tr>";
  thead.innerHTML = thHtml;

  // 바디
  var rows = "";
  var slice = filtered.slice(0, 3000);
  for(var i=0; i<slice.length; i++){
    var d = slice[i];
    var isFav = favs.has(d.stock_code);
    var bothPos = isBothPos(d, view);
    var naverUrl = "https://m.stock.naver.com/domestic/stock/" + d.stock_code + "/total";
    rows += '<tr' + (bothPos ? ' class="both-pos"' : "") + ">";
    rows += '<td><span class="star' + (isFav ? " on" : "") + '" data-code="' + d.stock_code + '">' + (isFav ? "⭐" : "☆") + "</span>";
    rows += '<a class="corp-link" href="' + naverUrl + '" target="_blank" rel="noopener">' + d.corp_name + "</a>";
    if(bothPos) rows += '<span class="both-badge">↑↑</span>';
    rows += "</td>";
    rows += '<td class="tc">' + d.stock_code + "</td>";
    rows += '<td><span class="badge ' + d.market.toLowerCase() + '">' + d.market + "</span></td>";
    QS.forEach(function(q, qi){
      rows += '<td' + (qi===4 ? ' class="grp-sep"' : "") + ">" + fmt(d[view][q]) + "</td>";
    });
    rows += '<td class="grp-sep">' + fmtP(d[view+"_qoq"]) + "</td>";
    rows += "<td>" + fmtP(d[view+"_yoy"]) + "</td>";
    rows += "</tr>";
  }
  tbody.innerHTML = rows;

  document.getElementById("stat").textContent =
    filtered.length.toLocaleString() + "개 기업" +
    (filtered.length > 3000 ? " (최대 3,000개)" : "") + " | 단위: 원";
}

// ── 이벤트 위임 ───────────────────────────────────────────────
document.addEventListener("click", function(e){
  // 헤더 정렬
  var th = e.target.closest("th[data-sort]");
  if(th){ thSort(th.dataset.sort); return; }
  // 즐겨찾기
  var star = e.target.closest(".star");
  if(star){
    e.preventDefault(); e.stopPropagation();
    var code = star.dataset.code;
    if(favs.has(code)){ favs.delete(code); star.classList.remove("on"); star.textContent = "☆"; }
    else { favs.add(code); star.classList.add("on"); star.textContent = "⭐"; }
    saveFavs();
    if(market === "FAV") applyFilter();
  }
});

// ── GitHub 동기화 ─────────────────────────────────────────────
var GH_OWNER = "whysosary-dot";
var GH_REPO  = "kospi-kosdaq-dashboard";
var GH_FILE  = "favs.json";
var GH_API   = "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + GH_FILE;

function getToken(){ return localStorage.getItem("dart_gh_token") || ""; }
function saveToken(t){ localStorage.setItem("dart_gh_token", t); }

function setSyncStatus(state, msg){
  var el = document.getElementById("sync-status");
  el.textContent = msg;
  el.className = "sync-status " + state;
  if(state !== "loading") setTimeout(function(){ el.textContent=""; el.className="sync-status"; }, 3000);
}

async function ghGet(){
  var r = await fetch(GH_API, {headers:{Authorization:"token "+getToken(), Accept:"application/vnd.github.v3+json"}});
  if(r.status === 404) return null;
  if(!r.ok) throw new Error("GitHub GET 실패: " + r.status);
  return r.json();
}
async function ghPut(content64, sha){
  var body = {message:"sync favs", content:content64};
  if(sha) body.sha = sha;
  var r = await fetch(GH_API, {method:"PUT", headers:{Authorization:"token "+getToken(), Accept:"application/vnd.github.v3+json", "Content-Type":"application/json"}, body:JSON.stringify(body)});
  if(!r.ok) throw new Error("GitHub PUT 실패: " + r.status);
  return r.json();
}
function b64enc(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64dec(str){ return decodeURIComponent(escape(atob(str))); }

async function syncFavs(direction){
  if(!getToken()){ showTokenModal(); return; }
  setSyncStatus("loading", direction === "push" ? "업로드 중…" : "다운로드 중…");
  try{
    var remote = await ghGet();
    if(direction === "push"){
      var sha = remote ? remote.sha : undefined;
      await ghPut(b64enc(JSON.stringify([...favs])), sha);
      setSyncStatus("ok", "☁️ 업로드 완료");
    } else {
      if(!remote){ setSyncStatus("ok","원격 데이터 없음"); return; }
      var remoteFavs = JSON.parse(b64dec(remote.content.replace(/\n/g,"")));
      favs = new Set(remoteFavs);
      saveFavs(); updateFavCount(); updateBothCount(); render();
      setSyncStatus("ok", "☁️ 다운로드 완료");
    }
  } catch(e){ setSyncStatus("err", e.message); }
}

// ── 토큰 모달 ────────────────────────────────────────────────
function showTokenModal(){
  document.getElementById("token-input").value = getToken();
  document.getElementById("token-modal").style.display = "flex";
}
function hideTokenModal(){ document.getElementById("token-modal").style.display = "none"; }
function saveTokenAndClose(){
  saveToken(document.getElementById("token-input").value.trim());
  hideTokenModal();
}

// ── 초기화 ───────────────────────────────────────────────────
document.getElementById("token-modal").addEventListener("click", function(e){
  if(e.target === this) hideTokenModal();
});
document.getElementById("search").addEventListener("input", applyFilter);
document.getElementById("qs").addEventListener("change", function(){ quickSort(this.value); this.value=""; });

updateFavCount();
updateBothCount();
applyFilter();
autoLoadFavs();
